<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Threshold — AI Musings</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --dot-off: #1a1a1a;
    --dot-on: #e8e0d0;
    --dot-border: #2a2a2a;
    --dot-border-on: #c8bfaf;
    --accent: #e8e0d0;
    --label: #333;
    --transition-snap: 180ms;
    --transition-release: 420ms;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }

  #permission-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    z-index: 100;
  }

  #permission-screen h1 {
    color: var(--accent);
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  #permission-screen p {
    color: #444;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-align: center;
    line-height: 1.8;
    max-width: 280px;
  }

  #start-btn {
    background: none;
    border: 1px solid #333;
    color: var(--accent);
    font-family: 'Courier New', monospace;
    font-size: 12px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 14px 36px;
    cursor: pointer;
    transition: border-color 300ms, color 300ms;
  }

  #start-btn:hover {
    border-color: var(--accent);
  }

  /* Hidden video for camera capture */
  #video {
    position: fixed;
    opacity: 0;
    pointer-events: none;
    width: 1px; height: 1px;
  }

  #canvas {
    display: none;
  }

  /* Main grid — full viewport width, dense */
  #grid {
    display: grid;
    grid-template-columns: repeat(36, 1fr);
    gap: 3px;
    padding: 16px 20px;
    width: 100vw;
  }

  /* Each cell — label wraps the radio for real radio button look */
  .cell {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* The real radio button — styled but recognisably a radio */
  .cell input[type="radio"] {
    appearance: none;
    -webkit-appearance: none;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 1.5px solid var(--dot-border);
    background: transparent;
    cursor: default;
    position: relative;
    transition:
      border-color var(--transition-release) cubic-bezier(0.34, 1.56, 0.64, 1),
      box-shadow var(--transition-release) cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .cell input[type="radio"].snapping {
    transition:
      border-color var(--transition-snap) cubic-bezier(0.22, 1, 0.36, 1),
      box-shadow var(--transition-snap) cubic-bezier(0.22, 1, 0.36, 1);
  }

  .cell input[type="radio"]:checked {
    border-color: var(--dot-border-on);
    box-shadow: 0 0 6px rgba(232, 224, 208, 0.15);
  }

  /* Inner filled dot — the classic radio button indicator */
  .cell input[type="radio"]::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 44%;
    height: 44%;
    border-radius: 50%;
    background: var(--dot-on);
    transform: translate(-50%, -50%) scale(0);
    opacity: 0;
    transition:
      transform var(--transition-release) cubic-bezier(0.34, 1.56, 0.64, 1),
      opacity var(--transition-release) cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .cell input[type="radio"].snapping::after {
    transition:
      transform var(--transition-snap) cubic-bezier(0.22, 1, 0.36, 1),
      opacity var(--transition-snap) cubic-bezier(0.22, 1, 0.36, 1);
  }

  .cell input[type="radio"]:checked::after {
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
  }

  /* Label strip at bottom */
  #label {
    position: fixed;
    bottom: 24px;
    left: 0; right: 0;
    text-align: center;
    color: var(--label);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  /* Threshold indicator */
  #thresh-hint {
    position: fixed;
    top: 24px;
    right: 24px;
    color: #222;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-align: right;
    line-height: 2;
    user-select: none;
  }

  #thresh-hint span {
    display: block;
    color: #2a2a2a;
  }
</style>
</head>
<body>

<div id="permission-screen">
  <h1>Threshold</h1>
  <p>A grid of radio buttons.<br>Your camera decides what gets selected.</p>
  <button id="start-btn">Allow Camera</button>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<div id="grid"></div>

<div id="thresh-hint">
  <span id="thresh-val">threshold —</span>
  <span>scroll to adjust</span>
</div>

<div id="label">threshold &mdash; ai musings</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const COLS = 36;
const ROWS = 22;
const BRIGHTNESS_THRESHOLD = 120; // 0–255, brightness above this = checked
const MIRROR = true; // mirror camera so it feels like a reflection

// ─── STATE ────────────────────────────────────────────────────────────────────
let threshold = BRIGHTNESS_THRESHOLD;
let running = false;
let prevStates = new Array(COLS * ROWS).fill(false);
// Grid is 36×22 = 792 cells
let frameId;

// ─── ELEMENTS ─────────────────────────────────────────────────────────────────
const video     = document.getElementById('video');
const canvas    = document.getElementById('canvas');
const grid      = document.getElementById('grid');
const permScreen = document.getElementById('permission-screen');
const startBtn  = document.getElementById('start-btn');
const threshVal = document.getElementById('thresh-val');

// ─── BUILD GRID ───────────────────────────────────────────────────────────────
const radios = [];

for (let i = 0; i < COLS * ROWS; i++) {
  const cell = document.createElement('div');
  cell.className = 'cell';

  const radio = document.createElement('input');
  radio.type = 'radio';
  radio.name = `r${i}`; // each is its own group so it can be independently checked
  radio.tabIndex = -1;

  cell.appendChild(radio);
  grid.appendChild(cell);
  radios.push(radio);
}

// ─── TONE.JS SOUND ENGINE ─────────────────────────────────────────────────────
let synth;

function initAudio() {
  // Membrane synth for that mechanical click
  synth = new Tone.PolySynth(Tone.MembraneSynth, {
    pitchDecay: 0.008,
    octaves: 3,
    envelope: {
      attack: 0.001,
      decay: 0.06,
      sustain: 0,
      release: 0.1,
    },
    volume: -18,
  }).toDestination();
}

// Map row index to pitch — higher rows = higher pitch
function rowToPitch(row) {
  // Subtle range: F2 at bottom to D3 at top
  const notes = ['F2','G2','A2','B2','C3','D3'];
  const idx = Math.floor((row / ROWS) * notes.length);
  return notes[Math.min(idx, notes.length - 1)];
}

// Batch sound triggers per frame to avoid overload
let toTrigger = [];

function flushSounds() {
  if (!synth || toTrigger.length === 0) return;
  // Play max 6 clicks per frame to avoid mud
  const batch = toTrigger.slice(0, 6);
  batch.forEach(({ note }) => {
    synth.triggerAttackRelease(note, '32n');
  });
  toTrigger = [];
}

// ─── CAMERA SETUP ─────────────────────────────────────────────────────────────
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 320 }, height: { ideal: 240 } }
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      canvas.width  = video.videoWidth  || 320;
      canvas.height = video.videoHeight || 240;
      running = true;
      loop();
    };
  } catch (err) {
    startBtn.textContent = 'Camera denied';
    console.error(err);
  }
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
const ctx = canvas.getContext('2d', { willReadFrequently: true });

function loop() {
  if (!running) return;
  frameId = requestAnimationFrame(loop);

  // Draw video to hidden canvas (mirrored)
  ctx.save();
  if (MIRROR) {
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
  }
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  ctx.restore();

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const pixels    = imageData.data;

  const cellW = canvas.width  / COLS;
  const cellH = canvas.height / ROWS;

  toTrigger = [];

  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const i = row * COLS + col;

      // Sample center pixel of this cell
      const px = Math.floor((col + 0.5) * cellW);
      const py = Math.floor((row + 0.5) * cellH);
      const pidx = (py * canvas.width + px) * 4;

      const r = pixels[pidx];
      const g = pixels[pidx + 1];
      const b = pixels[pidx + 2];

      // Perceived brightness (luminance)
      const brightness = 0.299 * r + 0.587 * g + 0.114 * b;
      const shouldCheck = brightness > threshold;

      const radio = radios[i];
      const wasChecked = prevStates[i];

      if (shouldCheck !== wasChecked) {
        // State change — apply snap class for fast transition
        radio.classList.add('snapping');
        radio.checked = shouldCheck;

        // Remove snap class after transition so release uses slow ease
        setTimeout(() => radio.classList.remove('snapping'), 200);

        // Queue sound only on CHECK (not uncheck — silence on release feels right)
        if (shouldCheck) {
          toTrigger.push({ note: rowToPitch(row), col, row });
        }

        prevStates[i] = shouldCheck;
      }
    }
  }

  flushSounds();
}

// ─── THRESHOLD SCROLL CONTROL ─────────────────────────────────────────────────
window.addEventListener('wheel', (e) => {
  threshold = Math.max(20, Math.min(235, threshold + e.deltaY * 0.3));
  threshVal.textContent = `threshold ${Math.round(threshold)}`;
}, { passive: true });

// Touch drag for mobile threshold adjust
let touchStartY = null;
window.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; }, { passive: true });
window.addEventListener('touchmove', (e) => {
  if (touchStartY === null) return;
  const dy = touchStartY - e.touches[0].clientY;
  threshold = Math.max(20, Math.min(235, threshold + dy * 0.5));
  threshVal.textContent = `threshold ${Math.round(threshold)}`;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

// ─── START BUTTON ─────────────────────────────────────────────────────────────
startBtn.addEventListener('click', async () => {
  await Tone.start(); // must be inside user gesture
  initAudio();
  permScreen.style.transition = 'opacity 600ms';
  permScreen.style.opacity = '0';
  setTimeout(() => permScreen.style.display = 'none', 600);
  startCamera();
});

// ─── TODO ─────────────────────────────────────────────────────────────────────
// TODO: Add a subtle bloom/glow on dense checked clusters
// TODO: Experiment with sampling multiple pixels per cell (average vs center)
// TODO: Edge detection pass — only check cells at brightness boundaries
// TODO: Add a "ghost" mode — radios fade back slowly after movement stops
// TODO: Portrait mode layout swap for mobile (swap COLS/ROWS)
</script>
</body>
</html>
