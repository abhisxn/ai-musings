<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THRESHOLD v2 // INSTRUMENT</title>
    <!-- Share Tech Mono Font -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <!-- Tone.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root {
            --bg: #050505;
            --fg: #00ff41; /* Matrix/Terminal Green */
            --accent: #008f11;
            --glitch: #ff003c;
            --glow: rgba(0, 255, 65, 0.3);
            --panel-bg: rgba(10, 10, 10, 0.98);
            --font: 'Share Tech Mono', monospace;
            --bracket-size: 20px;
            --cell-gap: 2px;
        }

        .theme-light {
            --bg: #e8e8e8;
            --fg: #121212;
            --accent: #888;
            --glow: rgba(0, 0, 0, 0.1);
            --panel-bg: rgba(232, 232, 232, 0.98);
        }

        /* TEMPERATURES */
        .temp-cool { --fg: #00f2ff; --accent: #0088ff; --glow: rgba(0, 242, 255, 0.3); }
        .temp-warm { --fg: #ffaa00; --accent: #ff5500; --glow: rgba(255, 170, 0, 0.3); }
        .temp-acid { --fg: #ccff00; --accent: #88ff00; --glow: rgba(204, 255, 0, 0.5); }

        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: var(--fg); 
            font-family: var(--font); overflow: hidden;
            transition: background 0.5s cubic-bezier(0.4, 0, 0.2, 1), color 0.5s;
        }

        #void { position: relative; width: 100vw; height: 100vh; }

        /* LENS & GRID */
        #lens-container {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            padding: 60px;
        }

        #lens-display {
            display: grid;
            grid-template-columns: repeat(36, 1fr);
            grid-template-rows: repeat(22, 1fr);
            gap: var(--cell-gap);
            width: 100%; height: 100%;
            max-width: 1200px; max-height: 733px;
        }

        /* HUD OVERLAY */
        #hud-overlay { position: absolute; inset: 0; pointer-events: none; }
        
        .hud-bracket {
            position: absolute; width: var(--bracket-size); height: var(--bracket-size);
            border: 1px solid var(--fg); opacity: 0.4;
            animation: bracket-flicker 4s infinite;
        }
        @keyframes bracket-flicker {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.1; }
            51% { opacity: 0.6; }
            52% { opacity: 0.4; }
        }
        .top-left { top: 30px; left: 30px; border-right: 0; border-bottom: 0; }
        .top-right { top: 30px; right: 30px; border-left: 0; border-bottom: 0; }
        .bottom-left { bottom: 30px; left: 30px; border-right: 0; border-top: 0; }
        .bottom-right { bottom: 30px; right: 30px; border-left: 0; border-top: 0; }

        #hud-status {
            position: absolute; bottom: 40px; left: 60px;
            font-size: 10px; display: flex; gap: 30px; opacity: 0.6;
            letter-spacing: 2px;
        }

        /* SCANLINES */
        #scanline-layer {
            position: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 2px 100%;
            z-index: 10; opacity: 0.2; pointer-events: none;
        }

        /* COCKPIT (Control Panel) */
        #cockpit {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 500px; z-index: 20;
        }

        #cockpit-trigger {
            background: var(--panel-bg); color: var(--fg);
            border: 1px solid var(--fg); border-bottom: 0;
            padding: 6px 20px; font-size: 11px; cursor: pointer;
            text-align: center; width: fit-content; margin: 0 auto;
            letter-spacing: 2px;
        }

        #cockpit-panel {
            background: var(--panel-bg); border: 1px solid var(--fg);
            height: 0; overflow: hidden; transition: height 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 0 25px;
            backdrop-filter: blur(10px);
        }
        #cockpit.open #cockpit-panel { height: 400px; padding: 25px; overflow-y: auto; }

        .control-group { margin-bottom: 18px; }
        .control-label { font-size: 9px; opacity: 0.4; margin-bottom: 6px; display: block; letter-spacing: 1.5px; }
        
        input[type="range"] { width: 100%; background: transparent; appearance: none; cursor: crosshair; }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 1px; background: var(--accent); }
        input[type="range"]::-webkit-slider-thumb {
            appearance: none; height: 14px; width: 4px; background: var(--fg);
            margin-top: -6px; border-radius: 0;
        }

        .btn-group { display: flex; flex-wrap: wrap; gap: 6px; }
        .btn-group button {
            background: none; border: 1px solid var(--accent); color: var(--fg);
            font-family: var(--font); font-size: 9px; padding: 5px 10px;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 1px;
        }
        .btn-group button.active { background: var(--fg); color: var(--bg); border-color: var(--fg); box-shadow: 0 0 10px var(--glow); }
        .btn-group button:hover:not(.active) { border-color: var(--fg); background: rgba(255,255,255,0.05); }

        /* AIRLOCK */
        #airlock {
            position: absolute; inset: 0; background: var(--bg);
            z-index: 100; display: flex; align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }
        .airlock-content { border: 1px solid var(--fg); padding: 50px; text-align: center; max-width: 400px; }
        h1 { font-size: 28px; margin: 0 0 15px 0; letter-spacing: 6px; font-weight: normal; }
        #airlock p { font-size: 11px; opacity: 0.5; margin-bottom: 40px; line-height: 1.6; letter-spacing: 1px; }
        #initialize-button {
            background: var(--fg); color: var(--bg); border: none;
            padding: 12px 40px; font-family: var(--font); cursor: pointer;
            letter-spacing: 3px; font-size: 14px;
            transition: transform 0.2s;
        }
        #initialize-button:hover { transform: scale(1.05); }

        /* CELL STYLING */
        .cell { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .cell input[type="radio"] { 
            appearance: none; width: 70%; height: 70%; border-radius: 50%;
            border: 1px solid var(--accent); transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .cell input[type="radio"]:checked { 
            background: var(--fg); border-color: var(--fg); 
            box-shadow: 0 0 10px var(--glow); transform: scale(1.1);
        }
        
        .cell span { font-size: 14px; line-height: 1; user-select: none; transition: color 0.1s; }
        .cell.mode-dots .dot { border-radius: 50%; background: var(--fg); box-shadow: 0 0 5px var(--glow); transition: all 0.1s; }
    </style>
</head>
<body class="theme-dark">

    <!-- THE VOID: Main Container -->
    <div id="void">
        
        <!-- HARDWARE: Video & Hidden Canvas -->
        <video id="hardware-feed" autoplay playsinline muted style="display:none"></video>
        <canvas id="processing-buffer" style="display:none"></canvas>

        <!-- LENS: Main Rendering Surface -->
        <div id="lens-container">
            <!-- Grid / ASCII / Particles will be injected here -->
            <div id="lens-display"></div>
        </div>

        <!-- HUD: Overlay Layer -->
        <div id="hud-overlay">
            <div class="hud-bracket top-left"></div>
            <div class="hud-bracket top-right"></div>
            <div class="hud-bracket bottom-left"></div>
            <div class="hud-bracket bottom-right"></div>
            
            <div id="hud-status">
                <span id="status-mode">MODE: STANDBY</span>
                <span id="status-hz">REFRESH: 00fps</span>
                <span id="status-id">SIG: THRESHOLD_V2</span>
            </div>

            <div id="scanline-layer"></div>
            <div id="glitch-overlay"></div>
        </div>

        <!-- COCKPIT: Control Panel (Hidden Pull-up) -->
        <div id="cockpit">
            <div id="cockpit-trigger">▲ SETTINGS</div>
            <div id="cockpit-panel">
                
                <div class="control-group">
                    <label class="control-label">THRESHOLD (10-245)</label>
                    <input type="range" id="param-threshold" min="10" max="245" value="128">
                </div>

                <div class="control-group">
                    <label class="control-label">SMOOTHING / DELAY (0-90%)</label>
                    <input type="range" id="param-smoothing" min="0" max="90" value="50">
                </div>

                <div class="control-group">
                    <label class="control-label">DECAY HOLD (0-3000ms)</label>
                    <input type="range" id="param-decay" min="0" max="3000" value="1000">
                </div>

                <div class="control-group">
                    <label class="control-label">RENDER_MODE</label>
                    <div class="btn-group" id="group-mode">
                        <button data-val="radio" class="active">RADIO</button>
                        <button data-val="ascii">ASCII</button>
                        <button data-val="block">BLOCK</button>
                        <button data-val="dots">DOTS</button>
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label">FILTER_MODE</label>
                    <div class="btn-group" id="group-filter">
                        <button data-val="threshold" class="active">THRESHOLD</button>
                        <button data-val="heatmap">HEATMAP</button>
                        <button data-val="negative">NEGATIVE</button>
                        <button data-val="edge">EDGE</button>
                        <button data-val="ghost">GHOST</button>
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label">SOUND_MODE</label>
                    <div class="btn-group" id="group-sound">
                        <button data-val="mute" class="active">MUTE</button>
                        <button data-val="click">CLICK</button>
                        <button data-val="tone">TONE</button>
                        <button data-val="static">STATIC</button>
                        <button data-val="pulse">PULSE</button>
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label">TEMPERATURE</label>
                    <div class="btn-group" id="group-temp">
                        <button data-val="default" class="active">DEFAULT</button>
                        <button data-val="cool">COOL</button>
                        <button data-val="warm">WARM</button>
                        <button data-val="acid">ACID</button>
                    </div>
                </div>

                <div class="control-group">
                    <div class="btn-group">
                        <button id="btn-theme">THEME: DARK</button>
                        <button id="btn-mirror" class="active">MIRROR: ON</button>
                    </div>
                </div>

            </div>
        </div>

        <!-- AIRLOCK: Initial Permission / Start Screen -->
        <div id="airlock">
            <div class="airlock-content">
                <h1>THRESHOLD v2</h1>
                <p>INITIALIZING OPTICAL SENSORS...<br>PLEASE GRANT ACCESS TO THE PRIMARY FEED.</p>
                <button id="initialize-button">INITIALIZE</button>
                <div id="airlock-error" style="display:none; color:var(--glitch); margin-top:20px;">SIGNAL_ERROR: ACCESS_DENIED</div>
            </div>
        </div>

    </div>

    <!-- MAIN LOGIC -->
    <script>
        const STATE = {
            initialized: false,
            width: 36,
            height: 22,
            mirror: true,
            threshold: 128,
            mode: 'radio', // radio, ascii, block, dots
            filter: 'threshold', // threshold, heatmap, negative, edge, ghost
            sound: 'mute', // mute, click, tone, static, pulse
            smoothing: 0.5,
            decay: 1000,
            fps: 0,
            lastFrameTime: performance.now(),
            
            // Buffers
            cells: [], // DOM references
            brightness: null, // Float32Array
            checked: null, // Uint8Array
            prevChecked: null, // For audio triggering
            prevBrightness: null // For smoothing
        };

        const CHARS = {
            ascii: '@#S%?*+;:,. '.split(''),
            block: '█▓▒░ '.split('')
        };

        const DOM = {
            airlock: document.getElementById('airlock'),
            video: document.getElementById('hardware-feed'),
            canvas: document.getElementById('processing-buffer'),
            display: document.getElementById('lens-display'),
            btnInit: document.getElementById('initialize-button'),
            errAirlock: document.getElementById('airlock-error'),
            statusHz: document.getElementById('status-hz'),
            statusMode: document.getElementById('status-mode'),
            cockpit: document.getElementById('cockpit'),
            cockpitTrigger: document.getElementById('cockpit-trigger'),

            // Params
            paramThreshold: document.getElementById('param-threshold'),
            paramSmoothing: document.getElementById('param-smoothing'),
            paramDecay: document.getElementById('param-decay'),
            groupMode: document.getElementById('group-mode'),
            groupFilter: document.getElementById('group-filter'),
            groupSound: document.getElementById('group-sound'),
            groupTemp: document.getElementById('group-temp'),
            btnTheme: document.getElementById('btn-theme'),
            btnMirror: document.getElementById('btn-mirror')
        };

        const ctx = DOM.canvas.getContext('2d', { willReadFrequently: true });

        // AUDIO ENGINE
        const AUDIO = {
            poly: null,
            noise: null,
            filter: null,
            init() {
                this.poly = new Tone.PolySynth(Tone.Synth).toDestination();
                this.poly.set({ oscillator: { type: 'sine' }, envelope: { attack: 0.01, release: 0.1 } });
                
                this.noise = new Tone.Noise('pink').start();
                this.filter = new Tone.Filter(2000, 'lowpass').toDestination();
                this.noise.connect(this.filter);
                this.noise.volume.value = -Infinity;
            },
            play(idx, freq) {
                if (STATE.sound === 'mute') return;
                
                if (STATE.sound === 'click') {
                    this.poly.triggerAttackRelease('C2', '32n', undefined, 0.1);
                } else if (STATE.sound === 'tone') {
                    const f = 100 + (freq / 255) * 800;
                    this.poly.triggerAttackRelease(f, '16n', undefined, 0.05);
                } else if (STATE.sound === 'static') {
                    this.noise.volume.rampTo(-20, 0.01);
                    setTimeout(() => this.noise.volume.rampTo(-Infinity, 0.05), 10);
                } else if (STATE.sound === 'pulse') {
                    const f = 50 + (freq / 255) * 200;
                    this.poly.triggerAttackRelease(f, '8n', undefined, 0.2);
                }
            }
        };

        // INITIALIZE
        DOM.btnInit.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 640, height: 480 }, 
                    audio: false 
                });
                
                DOM.video.srcObject = stream;
                DOM.video.onloadedmetadata = () => {
                    DOM.video.play();
                    startExperiment();
                };

                await Tone.start();
                AUDIO.init();
                console.log('Audio Context Started');

            } catch (err) {
                console.error('Camera Access Denied:', err);
                DOM.errAirlock.style.display = 'block';
            }
        });

        function startExperiment() {
            STATE.initialized = true;
            DOM.airlock.style.opacity = '0';
            setTimeout(() => DOM.airlock.style.display = 'none', 800);

            DOM.canvas.width = STATE.width;
            DOM.canvas.height = STATE.height;

            const totalCells = STATE.width * STATE.height;
            STATE.brightness = new Float32Array(totalCells);
            STATE.prevBrightness = new Float32Array(totalCells);
            STATE.checked = new Uint8Array(totalCells);
            STATE.prevChecked = new Uint8Array(totalCells);

            initGrid();
            requestAnimationFrame(loop);
        }

        function initGrid() {
            DOM.display.innerHTML = '';
            STATE.cells = [];
            DOM.statusMode.innerText = `MODE: ${STATE.mode.toUpperCase()}`;
            
            for (let i = 0; i < STATE.width * STATE.height; i++) {
                const cell = document.createElement('div');
                cell.className = `cell mode-${STATE.mode}`;
                let element;
                if (STATE.mode === 'radio') {
                    element = document.createElement('input');
                    element.type = 'radio';
                    element.disabled = true;
                } else if (STATE.mode === 'dots') {
                    element = document.createElement('div');
                    element.className = 'dot';
                } else {
                    element = document.createElement('span');
                }
                cell.appendChild(element);
                DOM.display.appendChild(cell);
                STATE.cells.push({ container: cell, element: element });
            }
        }

        function loop(now) {
            if (!STATE.initialized) return;
            const dt = now - STATE.lastFrameTime;
            STATE.fps = Math.round(1000 / dt);
            STATE.lastFrameTime = now;
            DOM.statusHz.innerText = `REFRESH: ${String(STATE.fps).padStart(2, '0')}fps`;

            ctx.save();
            if (STATE.mirror) { ctx.translate(STATE.width, 0); ctx.scale(-1, 1); }
            ctx.drawImage(DOM.video, 0, 0, STATE.width, STATE.height);
            ctx.restore();

            const pixels = ctx.getImageData(0, 0, STATE.width, STATE.height).data;
            processSignals(pixels);
            updateRender();
            requestAnimationFrame(loop);
        }

        function processSignals(pixels) {
            const w = STATE.width;
            const h = STATE.height;
            const total = w * h;

            for (let i = 0; i < total; i++) {
                const bright = (pixels[i * 4] + pixels[i * 4 + 1] + pixels[i * 4 + 2]) / 3;
                STATE.brightness[i] = STATE.brightness[i] * STATE.smoothing + bright * (1 - STATE.smoothing);
            }

            for (let i = 0; i < total; i++) {
                let val = STATE.brightness[i];
                STATE.prevChecked[i] = STATE.checked[i];

                switch (STATE.filter) {
                    case 'threshold': STATE.checked[i] = val > STATE.threshold ? 1 : 0; break;
                    case 'heatmap': STATE.checked[i] = Math.abs(val - STATE.threshold) < 40 ? 1 : 0; break;
                    case 'negative': STATE.checked[i] = (255 - val) > STATE.threshold ? 1 : 0; break;
                    case 'edge':
                        if (i % w > 0) STATE.checked[i] = Math.abs(val - STATE.brightness[i - 1]) > (STATE.threshold / 4) ? 1 : 0;
                        else STATE.checked[i] = 0;
                        break;
                    case 'ghost':
                        if (val > STATE.threshold) {
                            STATE.checked[i] = 1;
                            STATE.prevBrightness[i] = performance.now();
                        } else {
                            STATE.checked[i] = (performance.now() - STATE.prevBrightness[i]) < STATE.decay ? 1 : 0;
                        }
                        break;
                }

                // Audio Trigger (Throttled)
                if (STATE.checked[i] !== STATE.prevChecked[i] && Math.random() < 0.05) {
                    AUDIO.play(i, val);
                }
            }
        }

        function updateRender() {
            for (let i = 0; i < STATE.cells.length; i++) {
                const cell = STATE.cells[i];
                const isChecked = STATE.checked[i] === 1;
                const bright = STATE.brightness[i];

                if (STATE.mode === 'radio') cell.element.checked = isChecked;
                else if (STATE.mode === 'ascii') cell.element.innerText = isChecked ? CHARS.ascii[Math.floor((bright / 256) * CHARS.ascii.length)] : ' ';
                else if (STATE.mode === 'block') cell.element.innerText = isChecked ? CHARS.block[Math.floor((bright / 256) * CHARS.block.length)] : ' ';
                else if (STATE.mode === 'dots') {
                    const size = isChecked ? (bright / 255) * 100 : 0;
                    cell.element.style.width = `${size}%`;
                    cell.element.style.height = `${size}%`;
                }
            }
        }

        // COCKPIT LOGIC
        DOM.paramThreshold.addEventListener('input', (e) => STATE.threshold = parseInt(e.target.value));
        DOM.paramSmoothing.addEventListener('input', (e) => STATE.smoothing = parseInt(e.target.value) / 100);
        DOM.paramDecay.addEventListener('input', (e) => STATE.decay = parseInt(e.target.value));

        function setupButtonGroup(group, stateKey, callback) {
            const btns = group.querySelectorAll('button');
            btns.forEach(btn => {
                btn.addEventListener('click', () => {
                    btns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    STATE[stateKey] = btn.dataset.val;
                    if (callback) callback(btn.dataset.val);
                });
            });
        }

        setupButtonGroup(DOM.groupMode, 'mode', (val) => initGrid());
        setupButtonGroup(DOM.groupFilter, 'filter');
        setupButtonGroup(DOM.groupSound, 'sound');
        setupButtonGroup(DOM.groupTemp, 'temp', (val) => {
            document.body.classList.remove('temp-cool', 'temp-warm', 'temp-acid');
            if (val !== 'default') document.body.classList.add(`temp-${val}`);
        });

        DOM.btnTheme.addEventListener('click', () => {
            const isDark = document.body.classList.contains('theme-dark');
            document.body.classList.toggle('theme-dark', !isDark);
            document.body.classList.toggle('theme-light', isDark);
            DOM.btnTheme.innerText = `THEME: ${isDark ? 'LIGHT' : 'DARK'}`;
        });

        DOM.btnMirror.addEventListener('click', () => {
            STATE.mirror = !STATE.mirror;
            DOM.btnMirror.classList.toggle('active', STATE.mirror);
            DOM.btnMirror.innerText = `MIRROR: ${STATE.mirror ? 'ON' : 'OFF'}`;
        });

        DOM.cockpitTrigger.addEventListener('click', () => {
            DOM.cockpit.classList.toggle('open');
            DOM.cockpitTrigger.innerText = DOM.cockpit.classList.contains('open') ? '▼ CLOSE' : '▲ SETTINGS';
        });
    </script>
</body>
</html>
